<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple AI Page</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
      background: #111;
      color: #f4f4f4;
    }
    .container {
      width: min(540px, 90vw);
      padding: 28px;
      border-radius: 24px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    }
    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 2.5vw, 2.5rem);
    }
    p {
      margin: 0 0 22px;
      line-height: 1.6;
      color: #ccc;
    }
    label {
      display: block;
      margin-bottom: 10px;
      font-weight: 600;
    }
    textarea {
      width: 100%;
      min-height: 120px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.18);
      padding: 14px 16px;
      background: rgba(255,255,255,0.05);
      color: #f4f4f4;
      font-size: 1rem;
      resize: vertical;
    }
    button {
      margin-top: 16px;
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 16px;
      background: linear-gradient(135deg, #6d5dfc 0%, #2c7bff 100%);
      color: white;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
    }
    .output {
      margin-top: 24px;
      padding: 20px;
      border-radius: 20px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.12);
      min-height: 120px;
      white-space: pre-wrap;
    }
    .note {
      margin-top: 8px;
      color: #aaa;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Simple AI Page</h1>
    <p>Type a question or request, then click the button to generate a friendly AI-style response.</p>
    <label for="prompt">Ask the AI</label>
    <textarea id="prompt" placeholder="e.g. Write a short poem about space travel..."></textarea>
    <button id="generate">Generate Response</button>
    <div class="output" id="response">Your AI response will appear here.</div>
    <div class="note">This is a demo page with simulated AI replies for a simple interactive experience.</div>
  </div>

  <script>
    const promptInput = document.getElementById('prompt');
    const generateButton = document.getElementById('generate');
    const responseOutput = document.getElementById('response');

    const sampleReplies = [
      "Here is a clear answer to your request, written with helpful and friendly language.",
      "That sounds interesting! I would suggest starting with a simple plan and then refining each step.",
      "Great question! To solve this, focus on the main goal and keep the solution small and easy to test.",
      "The AI thinks this could work well: use a clean layout, meaningful labels, and calm colors.",
      "I recommend breaking the problem into smaller parts, then building each part one by one."
    ];

    generateButton.addEventListener('click', () => {
      const prompt = promptInput.value.trim();
      if (!prompt) {
        responseOutput.textContent = 'Please enter a prompt to get an AI-style response.';
        return;
      }

      generateButton.disabled = true;
      generateButton.textContent = 'Generating...';
      responseOutput.textContent = 'Thinking...';

      setTimeout(() => {
        const reply = sampleReplies[Math.floor(Math.random() * sampleReplies.length)];
        responseOutput.textContent = `Prompt: ${prompt}\n\nResponse: ${reply}`;
        generateButton.disabled = false;
        generateButton.textContent = 'Generate Response';
      }, 900);
    });
  </script>
</body>
</html>
