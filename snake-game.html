<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Arial', sans-serif;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .game-info {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            gap: 20px;
        }

        .info-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            font-size: 1.2em;
            min-width: 120px;
        }

        .info-label {
            font-size: 0.8em;
            opacity: 0.9;
            display: block;
            margin-bottom: 5px;
        }

        .info-value {
            font-size: 1.5em;
            font-weight: bold;
        }

        canvas {
            background: #1a1a1a;
            border: 3px solid #667eea;
            border-radius: 10px;
            display: block;
            margin: 20px auto;
            cursor: none;
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 25px;
            font-size: 1em;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .btn-start {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-start:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-reset {
            background: #ff6b6b;
            color: white;
        }

        .btn-reset:hover {
            background: #ff5252;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 107, 107, 0.4);
        }

        .instructions {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            text-align: left;
            font-size: 0.9em;
            color: #555;
        }

        .instructions h3 {
            margin-bottom: 10px;
            color: #333;
        }

        .instructions p {
            margin: 5px 0;
        }

        .key {
            background: #667eea;
            color: white;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
        }

        .game-over-message {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            font-size: 1.5em;
            z-index: 1000;
            min-width: 300px;
        }

        .game-over-message h2 {
            font-size: 2em;
            margin-bottom: 20px;
            color: #ff6b6b;
        }

        .game-over-message p {
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐍 Snake Game</h1>
        
        <div class="game-info">
            <div class="info-box">
                <span class="info-label">Score</span>
                <span class="info-value" id="score">0</span>
            </div>
            <div class="info-box">
                <span class="info-label">Level</span>
                <span class="info-value" id="level">1</span>
            </div>
            <div class="info-box">
                <span class="info-label">High Score</span>
                <span class="info-value" id="highScore">0</span>
            </div>
        </div>

        <canvas id="gameCanvas" width="400" height="400"></canvas>

        <div class="controls">
            <button class="btn-start" id="startBtn" onclick="toggleGame()">Start Game</button>
            <button class="btn-reset" id="resetBtn" onclick="resetGame()">Reset</button>
        </div>

        <div class="instructions">
            <h3>How to Play</h3>
            <p>Use <span class="key">↑ ↓ ← →</span> or <span class="key">W A S D</span> to move the snake</p>
            <p>Eat the red food <span style="color: #ff6b6b;">●</span> to grow and gain points</p>
            <p>Don't hit the walls or yourself!</p>
            <p>The game gets faster as your score increases</p>
        </div>
    </div>

    <div class="game-over-message" id="gameOverMessage">
        <h2>Game Over!</h2>
        <p>Final Score: <span id="finalScore">0</span></p>
        <p>Press Start to play again</p>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score');
        const levelDisplay = document.getElementById('level');
        const highScoreDisplay = document.getElementById('highScore');
        const startBtn = document.getElementById('startBtn');
        const gameOverMessage = document.getElementById('gameOverMessage');

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake = [{ x: 10, y: 10 }];
        let food = { x: 15, y: 15 };
        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };
        let score = 0;
        let gameRunning = false;
        let gameSpeed = 100;
        let highScore = localStorage.getItem('snakeHighScore') || 0;

        highScoreDisplay.textContent = highScore;

        function toggleGame() {
            if (!gameRunning) {
                gameRunning = true;
                startBtn.textContent = 'Pause Game';
                gameLoop();
            } else {
                gameRunning = false;
                startBtn.textContent = 'Resume Game';
            }
        }

        function resetGame() {
            snake = [{ x: 10, y: 10 }];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            gameSpeed = 100;
            gameRunning = false;
            gameOverMessage.style.display = 'none';
            scoreDisplay.textContent = score;
            levelDisplay.textContent = 1;
            startBtn.textContent = 'Start Game';
            generateFood();
            draw();
        }

        function generateFood() {
            food = {
                x: Math.floor(Math.random() * tileCount),
                y: Math.floor(Math.random() * tileCount)
            };

            // Make sure food doesn't spawn on snake
            for (let segment of snake) {
                if (segment.x === food.x && segment.y === food.y) {
                    generateFood();
                    return;
                }
            }
        }

        function update() {
            if (!gameRunning) return;

            direction = nextDirection;

            const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };

            // Check wall collision
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                endGame();
                return;
            }

            // Check self collision
            for (let segment of snake) {
                if (head.x === segment.x && head.y === segment.y) {
                    endGame();
                    return;
                }
            }

            snake.unshift(head);

            // Check food collision
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreDisplay.textContent = score;

                const level = Math.floor(score / 50) + 1;
                levelDisplay.textContent = level;
                gameSpeed = Math.max(50, 100 - (level - 1) * 10);

                generateFood();
            } else {
                snake.pop();
            }
        }

        function draw() {
            // Clear canvas
            ctx.fillStyle = '#1a1a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw grid (optional)
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
            ctx.lineWidth = 1;
            for (let i = 0; i <= tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }

            // Draw snake
            snake.forEach((segment, index) => {
                if (index === 0) {
                    // Head
                    ctx.fillStyle = '#4CAF50';
                    ctx.shadowColor = '#4CAF50';
                    ctx.shadowBlur = 10;
                } else {
                    // Body
                    ctx.fillStyle = '#45a049';
                    ctx.shadowColor = 'transparent';
                }
                ctx.fillRect(
                    segment.x * gridSize + 1,
                    segment.y * gridSize + 1,
                    gridSize - 2,
                    gridSize - 2
                );
            });

            ctx.shadowColor = 'transparent';

            // Draw food
            ctx.fillStyle = '#ff6b6b';
            ctx.shadowColor = '#ff6b6b';
            ctx.shadowBlur = 10;
            ctx.beginPath();
            ctx.arc(
                food.x * gridSize + gridSize / 2,
                food.y * gridSize + gridSize / 2,
                gridSize / 2 - 2,
                0,
                Math.PI * 2
            );
            ctx.fill();
            ctx.shadowColor = 'transparent';
        }

        function endGame() {
            gameRunning = false;
            startBtn.textContent = 'Start Game';

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
                highScoreDisplay.textContent = highScore;
            }

            document.getElementById('finalScore').textContent = score;
            gameOverMessage.style.display = 'block';
        }

        function gameLoop() {
            update();
            draw();

            if (gameRunning) {
                setTimeout(gameLoop, gameSpeed);
            }
        }

        document.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();

            if (key === 'arrowup' || key === 'w') {
                if (direction.y === 0) nextDirection = { x: 0, y: -1 };
                e.preventDefault();
            } else if (key === 'arrowdown' || key === 's') {
                if (direction.y === 0) nextDirection = { x: 0, y: 1 };
                e.preventDefault();
            } else if (key === 'arrowleft' || key === 'a') {
                if (direction.x === 0) nextDirection = { x: -1, y: 0 };
                e.preventDefault();
            } else if (key === 'arrowright' || key === 'd') {
                if (direction.x === 0) nextDirection = { x: 1, y: 0 };
                e.preventDefault();
            }
        });

        // Initialize
        generateFood();
        draw();
    </script>
</body>
</html>
