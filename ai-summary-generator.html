<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Summary Generator - Powered by Gemini</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 36px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .header p {
            font-size: 16px;
            opacity: 0.9;
        }

        .main-card {
            background: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
        }

        .api-setup {
            background: #f0f7ff;
            border: 2px solid #667eea;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 25px;
            font-size: 12px;
            color: #333;
        }

        .api-setup strong {
            color: #667eea;
        }

        .input-section {
            margin-bottom: 30px;
        }

        .input-label {
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 12px;
            display: block;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .api-key-input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 13px;
            font-family: 'Courier New', monospace;
            transition: border-color 0.3s;
        }

        .api-key-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .topic-input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
            margin-bottom: 15px;
        }

        .topic-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .preset-topics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }

        .topic-btn {
            padding: 10px 15px;
            background: #f0f0f0;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.3s;
            color: #333;
        }

        .topic-btn:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
            transform: translateY(-2px);
        }

        .topic-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        .btn-generate {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-width: 200px;
        }

        .btn-generate:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-generate:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-clear {
            background: #f0f0f0;
            color: #333;
            border: 2px solid #e0e0e0;
        }

        .btn-clear:hover {
            background: #e0e0e0;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 30px;
            color: #667eea;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 4px solid #f0f0f0;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .output-card {
            background: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
            display: none;
            animation: slideIn 0.5s ease;
        }

        .output-card.active {
            display: block;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .output-title {
            color: #667eea;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 3px solid #667eea;
        }

        .section {
            margin-bottom: 30px;
        }

        .section-title {
            color: #333;
            font-size: 16px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            color: #764ba2;
        }

        .key-points {
            list-style: none;
        }

        .key-points li {
            padding: 12px 15px;
            margin-bottom: 10px;
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            border-radius: 4px;
            color: #333;
            line-height: 1.6;
        }

        .key-points li:before {
            content: "✓ ";
            color: #667eea;
            font-weight: bold;
            margin-right: 10px;
        }

        .insight-box {
            background: linear-gradient(135deg, #ffeaa7 0%, #fdcb6e 100%);
            padding: 20px;
            border-radius: 8px;
            border-left: 5px solid #f39c12;
            color: #333;
            line-height: 1.6;
        }

        .insight-box:before {
            content: "💡 ";
            margin-right: 10px;
        }

        .action-box {
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            padding: 20px;
            border-radius: 8px;
            border-left: 5px solid #00b894;
            color: #333;
            line-height: 1.6;
            font-weight: 500;
        }

        .action-box:before {
            content: "🎯 ";
            margin-right: 10px;
        }

        .error-message {
            display: none;
            background: #ffe5e5;
            border: 2px solid #ff6b6b;
            border-radius: 8px;
            padding: 15px;
            color: #c92a2a;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .error-message.active {
            display: block;
        }

        .success-message {
            display: none;
            background: #e5ffe5;
            border: 2px solid #51cf66;
            border-radius: 8px;
            padding: 15px;
            color: #2b5f2e;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .success-message.active {
            display: block;
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 24px;
            }

            .main-card,
            .output-card {
                padding: 20px;
            }

            .preset-topics {
                grid-template-columns: repeat(2, 1fr);
            }

            .button-group {
                flex-direction: column;
            }

            .btn-generate {
                min-width: auto;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 AI Summary Generator</h1>
            <p>Powered by Google Gemini API</p>
        </div>

        <div class="main-card">
            <div class="api-setup">
                <strong>🔑 Setup Required:</strong> Get a free Gemini API key from 
                <a href="https://makersuite.google.com/app/apikey" target="_blank" style="color: #667eea; text-decoration: none;">Google AI Studio</a>
                and paste it below. This is used to power the AI summaries.
            </div>

            <div class="error-message" id="errorMessage"></div>
            <div class="success-message" id="successMessage"></div>

            <div class="input-section">
                <label class="input-label">API Key</label>
                <div class="input-group">
                    <input 
                        type="password" 
                        id="apiKeyInput" 
                        class="api-key-input" 
                        placeholder="sk-..." 
                        value=""
                    >
                    <button class="btn" onclick="toggleApiKeyVisibility()" style="background: #f0f0f0; color: #333; border: 2px solid #e0e0e0; padding: 12px 20px;">
                        👁️ Show
                    </button>
                </div>
            </div>

            <div class="input-section">
                <label class="input-label">Choose a Topic or Enter Your Own</label>
                
                <div class="preset-topics">
                    <button class="topic-btn" onclick="selectTopic('Artificial Intelligence')">🤖 AI</button>
                    <button class="topic-btn" onclick="selectTopic('Remote Jobs')">💼 Remote Jobs</button>
                    <button class="topic-btn" onclick="selectTopic('Cryptocurrency')">₿ Crypto</button>
                    <button class="topic-btn" onclick="selectTopic('Fitness')">💪 Fitness</button>
                    <button class="topic-btn" onclick="selectTopic('Digital Marketing')">📱 Marketing</button>
                    <button class="topic-btn" onclick="selectTopic('Productivity Tips')">⚡ Productivity</button>
                </div>

                <input 
                    type="text" 
                    id="topicInput" 
                    class="topic-input" 
                    placeholder="Or type any topic you'd like to learn about..."
                >
            </div>

            <div class="button-group">
                <button class="btn btn-generate" id="generateBtn" onclick="generateSummary()">Generate Brief</button>
                <button class="btn btn-clear" onclick="clearAll()">Clear</button>
            </div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Generating your summary... please wait</p>
            </div>
        </div>

        <div class="output-card" id="outputCard">
            <div id="summaryOutput"></div>
        </div>
    </div>

    <script>
        const apiKeyInput = document.getElementById('apiKeyInput');
        const topicInput = document.getElementById('topicInput');
        const generateBtn = document.getElementById('generateBtn');
        const loading = document.getElementById('loading');
        const outputCard = document.getElementById('outputCard');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');
        let selectedTopic = '';

        // Save API key to localStorage
        apiKeyInput.addEventListener('change', function() {
            localStorage.setItem('geminiApiKey', this.value);
            if (this.value) {
                showSuccess('API Key saved successfully!');
            }
        });

        // Load API key from localStorage
        window.addEventListener('load', function() {
            const savedKey = localStorage.getItem('geminiApiKey');
            if (savedKey) {
                apiKeyInput.value = savedKey;
            }
        });

        function toggleApiKeyVisibility() {
            const btn = event.target.closest('button');
            if (apiKeyInput.type === 'password') {
                apiKeyInput.type = 'text';
                btn.textContent = '🙈 Hide';
            } else {
                apiKeyInput.type = 'password';
                btn.textContent = '👁️ Show';
            }
        }

        function selectTopic(topic) {
            selectedTopic = topic;
            topicInput.value = topic;
            
            // Update button styling
            document.querySelectorAll('.topic-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
        }

        function showError(message) {
            errorMessage.textContent = '❌ ' + message;
            errorMessage.classList.add('active');
            successMessage.classList.remove('active');
            setTimeout(() => {
                errorMessage.classList.remove('active');
            }, 5000);
        }

        function showSuccess(message) {
            successMessage.textContent = '✅ ' + message;
            successMessage.classList.add('active');
            errorMessage.classList.remove('active');
            setTimeout(() => {
                successMessage.classList.remove('active');
            }, 3000);
        }

        async function generateSummary() {
            const topic = topicInput.value.trim();
            const apiKey = apiKeyInput.value.trim();

            // Validation
            if (!apiKey) {
                showError('Please enter your Gemini API Key');
                return;
            }

            if (!topic) {
                showError('Please select or enter a topic');
                return;
            }

            // Show loading state
            loading.classList.add('active');
            outputCard.classList.remove('active');
            generateBtn.disabled = true;
            errorMessage.classList.remove('active');

            try {
                const response = await fetch(
                    `https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${apiKey}`,
                    {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            contents: [{
                                parts: [{
                                    text: getPrompt(topic)
                                }]
                            }]
                        })
                    }
                );

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error?.message || 'API request failed');
                }

                const data = await response.json();
                
                if (!data.candidates || !data.candidates[0] || !data.candidates[0].content) {
                    throw new Error('Invalid API response format');
                }

                const generatedText = data.candidates[0].content.parts[0].text;
                displaySummary(topic, generatedText);
                showSuccess('Summary generated successfully!');

            } catch (error) {
                console.error('Error:', error);
                showError(error.message || 'Failed to generate summary. Please check your API key and try again.');
            } finally {
                loading.classList.remove('active');
                generateBtn.disabled = false;
            }
        }

        function getPrompt(topic) {
            return `Generate a structured brief about "${topic}" with EXACTLY this format:

TITLE: [Create a short, engaging title about the topic - max 7 words]

KEY POINTS:
- [First important point about the topic]
- [Second important point about the topic]
- [Third important point about the topic]

INSIGHT:
[One interesting observation or unique perspective about the topic - 1-2 sentences]

ACTION STEP:
[One practical, actionable step the reader can take to learn or engage with this topic - be specific]

Make sure to:
1. Start directly with TITLE: without any preamble
2. Use exactly 3 bullet points under KEY POINTS
3. Include INSIGHT: section with one meaningful observation
4. Include ACTION STEP: section with one concrete action
5. Keep language clear, concise, and engaging`;
        }

        function displaySummary(topic, text) {
            const sections = parseResponse(text);
            
            let html = `<div class="output-title">${sections.title || topic}</div>`;
            
            if (sections.keyPoints && sections.keyPoints.length > 0) {
                html += `
                    <div class="section">
                        <div class="section-title">📌 Key Points</div>
                        <ul class="key-points">
                            ${sections.keyPoints.map(point => `<li>${point}</li>`).join('')}
                        </ul>
                    </div>
                `;
            }
            
            if (sections.insight) {
                html += `
                    <div class="section">
                        <div class="section-title">💡 Insight</div>
                        <div class="insight-box">${sections.insight}</div>
                    </div>
                `;
            }
            
            if (sections.actionStep) {
                html += `
                    <div class="section">
                        <div class="section-title">🎯 Action Step</div>
                        <div class="action-box">${sections.actionStep}</div>
                    </div>
                `;
            }

            document.getElementById('summaryOutput').innerHTML = html;
            outputCard.classList.add('active');
        }

        function parseResponse(text) {
            const sections = {
                title: '',
                keyPoints: [],
                insight: '',
                actionStep: ''
            };

            // Extract title
            const titleMatch = text.match(/TITLE:\s*(.+?)(?:\n|$)/i);
            if (titleMatch) {
                sections.title = titleMatch[1].trim();
            }

            // Extract key points
            const keyPointsMatch = text.match(/KEY POINTS:\s*([\s\S]*?)(?=INSIGHT:|INSIGHT|$)/i);
            if (keyPointsMatch) {
                const points = keyPointsMatch[1].match(/^[-•*]\s+(.+?)$/gm);
                if (points) {
                    sections.keyPoints = points.map(p => p.replace(/^[-•*]\s+/, '').trim());
                }
            }

            // Extract insight
            const insightMatch = text.match(/INSIGHT:\s*([\s\S]*?)(?=ACTION|$)/i);
            if (insightMatch) {
                sections.insight = insightMatch[1].trim().split('\n')[0];
            }

            // Extract action step
            const actionMatch = text.match(/ACTION STEP:\s*([\s\S]*?)$/i);
            if (actionMatch) {
                sections.actionStep = actionMatch[1].trim().split('\n')[0];
            }

            return sections;
        }

        function clearAll() {
            topicInput.value = '';
            document.querySelectorAll('.topic-btn').forEach(btn => btn.classList.remove('active'));
            outputCard.classList.remove('active');
            errorMessage.classList.remove('active');
            selectedTopic = '';
        }
    </script>
</body>
</html>
